[package]
name = "rust"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
rust-version = "1.88"

[lib]
crate-type = ["staticlib"]

# To convert stop!() to panic!(), set RUST_BACKTRACE=1 environment variable.
[profile.release]
debug = 1
lto = "thin"

[dependencies]
crossbeam = "0.8.1"
rayon = "1.7.0"
roxido = { path="roxido" }
dahl-randompartition = { git="https://github.com/dbdahl/rust-dahl-randompartition.git", rev="56edec838" }
# dahl-randompartition = { path="/home/dahl/docs/devel/rust-dahl-randompartition" }
walltime = { git="https://github.com/dbdahl/rust-dahl-walltime.git", rev="0c7b7000d" }
slice_sampler = { git="https://github.com/dbdahl/rust_slice_sampler.git", rev="5b845c4" }
nalgebra = "0.34.0"
rand = "0.10.0"
rand_distr = "0.6.0"
rand_pcg = "0.10.0"
num-traits = "0.2.15"
statrs = "0.18.0"
fastrand = "2.0.0"
